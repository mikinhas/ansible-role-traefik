---
- name: Create traefik config directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create traefik acme directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/acme"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: traefik_acme_email

- name: Create traefik certs directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: traefik_tls_cert and traefik_tls_key

- name: Copy TLS certificate
  become: true
  ansible.builtin.copy:
    src: "{{ traefik_tls_cert }}"
    dest: "{{ traefik_config_dir }}/certs/cert.pem"
    owner: root
    group: root
    mode: "0600"
  when: traefik_tls_cert and traefik_tls_key
  notify: Restart traefik

- name: Copy TLS private key
  become: true
  ansible.builtin.copy:
    src: "{{ traefik_tls_key }}"
    dest: "{{ traefik_config_dir }}/certs/key.pem"
    owner: root
    group: root
    mode: "0600"
  when: traefik_tls_cert and traefik_tls_key
  notify: Restart traefik

- name: Configure traefik static config
  become: true
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Configure traefik dynamic config
  become: true
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_config_dir }}/dynamic.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Run traefik container
  community.docker.docker_container:
    name: "{{ traefik_container_name }}"
    image: "traefik:{{ traefik_version }}"
    state: started
    restart_policy: unless-stopped
    ports: >-
      {{
        ['80:80', '443:443'] +
        traefik_tcp_entrypoints | map(attribute='port') | map('regex_replace', '(.+)', '\\1:\\1') | list
      }}
    volumes: >-
      {{
        [
          traefik_config_dir ~ '/traefik.yml:/etc/traefik/traefik.yml:ro',
          traefik_config_dir ~ '/dynamic.yml:/etc/traefik/dynamic.yml:ro',
        ] + (
          [traefik_config_dir ~ '/acme:/etc/traefik/acme'] if traefik_acme_email else []
        ) + (
          [traefik_config_dir ~ '/certs:/etc/traefik/certs:ro'] if (traefik_tls_cert and traefik_tls_key) else []
        )
      }}
