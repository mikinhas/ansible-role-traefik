---
- name: Create traefik config directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create traefik acme directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/acme"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: traefik_acme_email | length > 0

- name: Create traefik certs directory
  become: true
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/certs"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: traefik_tls_cert | length > 0 and traefik_tls_key | length > 0

- name: Copy TLS certificate
  become: true
  ansible.builtin.copy:
    src: "{{ traefik_tls_cert }}"
    dest: "{{ traefik_config_dir }}/certs/cert.pem"
    owner: root
    group: root
    mode: "0600"
  when: traefik_tls_cert | length > 0 and traefik_tls_key | length > 0
  notify: Restart traefik

- name: Copy TLS private key
  become: true
  ansible.builtin.copy:
    src: "{{ traefik_tls_key }}"
    dest: "{{ traefik_config_dir }}/certs/key.pem"
    owner: root
    group: root
    mode: "0600"
  when: traefik_tls_cert | length > 0 and traefik_tls_key | length > 0
  notify: Restart traefik

- name: Configure traefik static config
  become: true
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Configure traefik dynamic config
  become: true
  ansible.builtin.template:
    src: dynamic.yml.j2
    dest: "{{ traefik_config_dir }}/dynamic.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik

- name: Build custom entrypoint ports
  ansible.builtin.set_fact:
    _traefik_custom_ports: >-
      {{
        ((traefik_http | default([]) | selectattr('port', 'defined') | map(attribute='port') | list) +
         (traefik_tcp | default([]) | map(attribute='port') | list))
        | map('string') | map('regex_replace', '^(.*)$', '\1:\1') | list
      }}

- name: Run traefik container
  community.docker.docker_container:
    name: "{{ traefik_container_name }}"
    image: "traefik:{{ traefik_version }}"
    state: started
    restart_policy: unless-stopped
    networks: "{{ traefik_networks | default(omit) }}"
    ports: >-
      {{
        ['80:80']
        + (['443:443'] if traefik_http | default([]) | selectattr('tls', 'defined') | selectattr('tls') | list | length > 0 else [])
        + (_traefik_custom_ports | default([]))
      }}
    volumes: >-
      {{
        [
          traefik_config_dir ~ '/traefik.yml:/etc/traefik/traefik.yml:ro',
          traefik_config_dir ~ '/dynamic.yml:/etc/traefik/dynamic.yml:ro',
        ] + (
          [traefik_config_dir ~ '/acme:/etc/traefik/acme'] if traefik_acme_email | length > 0 else []
        ) + (
          [traefik_config_dir ~ '/certs:/etc/traefik/certs:ro'] if (traefik_tls_cert | length > 0 and traefik_tls_key | length > 0) else []
        )
      }}
