---
- name: Converge
  hosts: all
  become: true
  gather_facts: true
  roles:
    - role: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"
      vars:
        traefik_http:
          - name: test-app
            rule: Host(`test.example.com`)
            tls: true
            backends:
              - http://127.0.0.1:8080

          - name: test-http-only
            rule: Host(`http.example.com`)
            backends:
              - http://127.0.0.1:9090

          - name: test-ipallow
            rule: Host(`restricted.example.com`)
            tls: true
            backends:
              - http://127.0.0.1:3000
            allowed_ips:
              - 10.0.0.0/8
              - 192.168.1.0/24

          - name: test-custom-port
            rule: PathPrefix(`/`)
            port: 8096
            backends:
              - http://127.0.0.1:8080

        traefik_tcp:
          - name: test-tcp
            port: 5432
            rule: HostSNI(`*`)
            backends:
              - 127.0.0.1:5432
