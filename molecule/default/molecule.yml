---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true

driver:
  name: vagrant
  provider:
    name: virtualbox

platforms:
  - name: ubuntu-noble
    box: bento/ubuntu-24.04
    memory: 1024
    cpus: 1

provisioner:
  name: ansible
  env:
    ANSIBLE_LIBRARY: ${VIRTUAL_ENV}/lib/python3.12/site-packages/molecule_plugins/vagrant/modules
  playbooks:
    converge: converge.yml

verifier:
  name: testinfra
