---
traefik_version: "v3.2"
traefik_container_name: traefik
traefik_config_dir: /etc/traefik
traefik_acme_email: ""
traefik_acme_server: "https://acme-v02.api.letsencrypt.org/directory"

traefik_http_routers: []
# Example:
# traefik_http_routers:
#   - name: myapp
#     rule: "Host(`myapp.example.com`)"
#     service: myapp
#     tls: true
#   - name: api
#     rule: "Host(`api.example.com`) && PathPrefix(`/v1`)"
#     service: api
#     tls: true

traefik_services: []
# Example:
# traefik_services:
#   - name: myapp
#     urls:
#       - "http://192.168.1.10:8080"
#   - name: api
#     urls:
#       - "http://192.168.1.11:3000"
#       - "http://192.168.1.12:3000"

traefik_tcp_entrypoints: []
# Example:
# traefik_tcp_entrypoints:
#   - name: mydb
#     port: 5432

traefik_tcp_routers: []
# Example:
# traefik_tcp_routers:
#   - name: mydb
#     entrypoint: mydb
#     rule: "HostSNI(`*`)"
#     service: mydb

traefik_tcp_services: []
# Example:
# traefik_tcp_services:
#   - name: mydb
#     urls:
#       - "192.168.1.10:5432"
#       - "192.168.1.11:5432"
